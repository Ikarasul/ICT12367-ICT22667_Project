{% load static %}
<link rel="stylesheet" href="{% static 'css/components_navbar.css' %}">

{% load i18n %}
<nav class="fixed top-0 w-full z-50 bg-white shadow-sm h-16 flex justify-between items-center px-8 transition-all">
  <div class="flex items-center gap-10">
    <a href="/" class="text-xl font-black text-[#16a34a] tracking-tight" style="font-family:'Plus Jakarta Sans',sans-serif;">DylanCompany</a>
    <div class="hidden md:flex items-center gap-6 font-bold text-sm" style="font-family:'Plus Jakarta Sans',sans-serif;">
      <a class="{% if request.path == '/' or request.path == '/tours/' %}text-[#16a34a] border-b-2 border-[#16a34a] pb-1{% else %}text-gray-600 hover:text-[#22c55e] transition-colors pb-1{% endif %}" href="/tours/">{% trans "Tours" %}</a>
      <a class="{% if 'my-tickets' in request.path %}text-[#16a34a] border-b-2 border-[#16a34a] pb-1{% else %}text-gray-600 hover:text-[#22c55e] transition-colors pb-1{% endif %}" href="/my-tickets/">{% trans "Tickets" %}</a>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <!-- Language Switcher -->
    <div class="relative">
      <form action="{% url 'set_language' %}" method="post" id="language-form" class="m-0 p-0">
        {% csrf_token %}
        <input name="next" type="hidden" value="{{ request.get_full_path }}">
        <select name="language" onchange="document.getElementById('language-form').submit()" class="appearance-none bg-gray-50 border border-gray-100 text-xs font-bold cursor-pointer outline-none rounded-full px-4 py-2 text-gray-600 hover:text-[#16a34a] transition-colors uppercase">
          {% get_current_language as LANGUAGE_CODE %}
          {% get_available_languages as LANGUAGES %}
          {% for lang in LANGUAGES %}
            <option value="{{ lang.0 }}" {% if lang.0 == LANGUAGE_CODE %}selected{% endif %}>
              🌐 {{ lang.0|upper }}
            </option>
          {% endfor %}
        </select>
      </form>
    </div>

    <!-- Profile Dropdown (if logged in) or Login button -->
    {% if request.session.user_id %}
      <div class="relative">
        <button id="profile-btn" class="w-10 h-10 rounded-full bg-gray-50 border border-gray-100 flex items-center justify-center text-gray-600 hover:bg-[#dcfce7] hover:text-[#16a34a] transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </button>
        <div id="profileMenu" class="dropdown-menu absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-xl border border-gray-100 p-2 z-50">
          <a href="/my-tickets/" class="block px-4 py-2 text-sm text-gray-700 hover:bg-[#fce7f3] hover:text-[#db2777] rounded-xl font-bold transition-colors">{% trans "My Tickets" %}</a>
          <a href="/logout/" class="block px-4 py-2 text-sm text-red-500 font-bold hover:bg-red-50 rounded-xl transition-colors">{% trans "Logout" %}</a>
        </div>
      </div>
    {% else %}
      <a href="/login/" class="bg-[#16a34a] hover:bg-[#15803d] text-white px-6 py-2 rounded-full font-bold text-sm transition-all shadow-md active:scale-95" style="font-family:'Plus Jakarta Sans',sans-serif;">
        {% trans "Login" %}
      </a>
    {% endif %}
  </div>
</nav>



<script src="{% static 'js/components_navbar.js' %}"></script>
